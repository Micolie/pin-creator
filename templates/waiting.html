<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Connecting...</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif; background: #f5f5f5;
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .card {
    background: #fff; border-radius: 20px; padding: 48px 40px; text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1); max-width: 400px; width: 100%;
  }
  .pin { font-size: 3.5rem; margin-bottom: 16px; animation: bounce 1s infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
  h2 { font-size: 1.4rem; margin-bottom: 8px; color: #333; }
  p  { color: #888; font-size: 0.95rem; line-height: 1.5; }
  .spinner-row { display: flex; justify-content: center; margin: 24px 0; }
  .spinner {
    border: 4px solid #f3f3f3; border-top: 4px solid #e60023;
    border-radius: 50%; width: 36px; height: 36px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<script>
  // Poll until logged in, then redirect
  async function poll() {
    const r = await fetch("/check_login");
    const data = await r.json();
    if (data.logged_in) { window.location.href = "/"; }
    else { setTimeout(poll, 1500); }
  }
  window.onload = poll;
</script>
</head>
<body>
<div class="card">
  <div class="pin">ðŸ“Œ</div>
  <h2>Connecting to Pinterest</h2>
  <p>A browser window has opened. Please log in and approve the app.</p>
  <div class="spinner-row"><div class="spinner"></div></div>
  <p>This page will update automatically once you're connected.</p>
</div>
</body>
</html>
